<div id="contact">
        <h1>Contact us</h1>
         <script>
        function validateForm() {
            let firstName = document.getElementById("fname").value;
            let lastName = document.getElementById("lname").value;
            let email = document.getElementById("email").value;
            let message = document.getElementById("message").value;

            if (firstName === "" || lastName === "" || email === "" || message === "") {
                alert("Please Complete Form");
                return false; 
            } else {
                alert("Thank you for contacting us, we will send you a text on your email");
                return true;
            }
        }
    </script>
<form onsubmit="return validateForm()">
 
         <label>First Name:</label><br>
        <input type="text" id="fname"><br><br>

        <label>Last Name:</label><br>
        <input type="text" id="lname"><br><br>

        <label>Email Address:</label><br>
        <input type="email" id="email"><br><br>

        <label>Select One</label><br>
        <input type="radio" id="radio"><br><br>

        <label>Please Enter Your Question:</label><br>
        <textarea id="message" rows="5" cols="30"></textarea><br><br>

         <button type="submit">Submit</button>

            </form>
